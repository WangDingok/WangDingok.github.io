<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Privacy Policy</title>
  <style>
    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      background-color: #f4f6f9;
      color: #333;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 2rem;
    }

    .card {
      background: #fff;
      border-radius: 12px;
      box-shadow: 0 4px 24px rgba(0, 0, 0, 0.08);
      max-width: 640px;
      width: 100%;
      padding: 2.5rem 3rem;
    }

    .card header {
      border-bottom: 2px solid #e8eaf0;
      padding-bottom: 1.25rem;
      margin-bottom: 1.75rem;
    }

    .card header h1 {
      font-size: 1.6rem;
      font-weight: 700;
      color: #1a1a2e;
      letter-spacing: -0.3px;
    }

    .card header p {
      margin-top: 0.35rem;
      font-size: 0.875rem;
      color: #888;
    }

    .policy-list {
      list-style: none;
      display: flex;
      flex-direction: column;
      gap: 1rem;
    }

    .policy-list li {
      display: flex;
      align-items: flex-start;
      gap: 0.85rem;
      font-size: 0.97rem;
      line-height: 1.6;
      color: #444;
    }

    .policy-list li .icon {
      flex-shrink: 0;
      width: 28px;
      height: 28px;
      border-radius: 50%;
      background: #eef1fb;
      display: flex;
      align-items: center;
      justify-content: center;
      margin-top: 0.05rem;
    }

    .policy-list li .icon svg {
      width: 14px;
      height: 14px;
      stroke: #4a6cf7;
      fill: none;
      stroke-width: 2.2;
      stroke-linecap: round;
      stroke-linejoin: round;
    }

    .card footer {
      margin-top: 2rem;
      padding-top: 1.25rem;
      border-top: 1px solid #e8eaf0;
      font-size: 0.875rem;
      color: #666;
    }

    .card footer a {
      color: #4a6cf7;
      text-decoration: none;
      font-weight: 500;
    }

    .card footer a:hover {
      text-decoration: underline;
    }
  </style>
</head>
<body>
  <div class="card">
    <header>
      <h1>Privacy Policy</h1>
      <p>Last updated: March 2025</p>
    </header>

    <ul class="policy-list">
      <li>
        <span class="icon">
          <svg viewBox="0 0 24 24"><polyline points="20 6 9 17 4 12"/></svg>
        </span>
        <span>We collect publicly available Pinterest data for trend analysis and research purposes.</span>
      </li>
      <li>
        <span class="icon">
          <svg viewBox="0 0 24 24"><polyline points="20 6 9 17 4 12"/></svg>
        </span>
        <span>We do not sell personal data.</span>
      </li>
      <li>
        <span class="icon">
          <svg viewBox="0 0 24 24"><polyline points="20 6 9 17 4 12"/></svg>
        </span>
        <span>We do not share collected information with third parties.</span>
      </li>
    </ul>

    <footer>
      For inquiries, contact:
      <a href="mailto:doanphucduoc2@email.com">doanphucduoc2@email.com</a>
    </footer>
  </div>
</body>
</html>
